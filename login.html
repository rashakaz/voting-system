<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | UMMA Student Voting System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <img src="images/logo.jpg" alt="UMMA Logo" class="nav-logo">
        <span>UMMA Voting System</span>
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="index.html#about">About</a>
        <a href="index.html#features">Features</a>
        <a href="signup.html" class="btn-nav"><i class="fas fa-user-plus"></i> Register</a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </div>
  </nav>

  <section class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
        <h2>Welcome Back</h2>
        <p>Log in as a student or administrator</p>
      </div>

      <form id="loginForm" method="post" action="api/login.php" novalidate>
        <div class="form-group">
          <label for="username">Username or Email</label>
          <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="username" name="username" placeholder="Enter your username or email" required>
          </div>
          <span class="error-message" id="usernameError">Please enter your username or email</span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
          </div>
          <span class="error-message" id="passwordError">Please enter your password</span>
        </div>

        <div class="form-options">
          <label>
            <input type="checkbox" id="rememberMe"> Remember Me
          </label>
          <a href="#"><i class="fas fa-question-circle"></i> Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          <i class="fas fa-sign-in-alt"></i> Log In
        </button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="signup.html">Register Here</a></p>
      </div>
    </div>
  </section>

  <script src="js/script.js?v=auth-message-fix-20260723"></script>
</body>
</html>
